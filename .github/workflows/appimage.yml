name: Build AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEBIAN_FRONTEND: noninteractive
      WAYWALLEN_CONDA_ENV: waywallen
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G
    steps:
      - name: Install OS prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl ca-certificates git bzip2 file xz-utils \
            build-essential pkg-config glslang-tools ccache \
            libfuse2 libxkbcommon0 libgl1 libegl1 libpulse-dev \
            libglib2.0-0 libgles-dev libgbm-dev libfreetype-dev \
            libpipewire-0.3-dev

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Miniconda
        run: |
          curl -fsSL -o /tmp/miniconda.sh \
            https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash /tmp/miniconda.sh -b -p "$HOME/miniconda"
          echo "$HOME/miniconda/bin" >> "$GITHUB_PATH"
          echo "$HOME/miniconda/condabin" >> "$GITHUB_PATH"

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: ~/miniconda/envs/waywallen
          key: conda-${{ runner.os }}-${{ hashFiles('environment.yml') }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/clang-release/cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'displays/*/Cargo.toml') }}

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Build AppImage
        run: bash ./scripts/build_appimage.sh

      - name: ccache stats
        if: always()
        run: ccache -s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waywallen-appimage
          path: waywallen-*-x86_64.AppImage

      # Only release for a tag: tag push, or a manual run whose input starts with "v".
      - name: Determine release
        id: rel
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ] || [[ "$REF" == v* ]]; then
            echo "tag=$REF" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        if: steps.rel.outputs.is_release == 'true'
        run: |
          python3 scripts/changelog.py "${{ steps.rel.outputs.tag }}" > /tmp/changelog.md
          cat /tmp/changelog.md

      - name: Create release
        if: steps.rel.outputs.is_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.rel.outputs.tag }}
          artifacts: waywallen-*-x86_64.AppImage
          bodyFile: /tmp/changelog.md
          allowUpdates: true
          replacesArtifacts: true
