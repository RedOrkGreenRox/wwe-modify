name: Build AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        flavor: [lite, full]
    env:
      DEBIAN_FRONTEND: noninteractive
      WAYWALLEN_CONDA_ENV: waywallen
    steps:
      - name: Install OS prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl ca-certificates git bzip2 file xz-utils \
            build-essential pkg-config glslang-tools \
            libfuse2 libxkbcommon0 libgl1 libegl1 libpulse-dev \
            libglib2.0-0 libgles-dev libgbm-dev libfreetype-dev \
            libpipewire-0.3-dev libarchive-tools

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Miniconda
        run: |
          curl -fsSL -o /tmp/miniconda.sh \
            https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash /tmp/miniconda.sh -b -p "$HOME/miniconda"
          echo "$HOME/miniconda/bin" >> "$GITHUB_PATH"
          echo "$HOME/miniconda/condabin" >> "$GITHUB_PATH"

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: ~/miniconda/envs/waywallen
          key: conda-${{ runner.os }}-${{ matrix.flavor }}-${{ hashFiles('environment.yml', 'scripts/build_ffmpeg.sh') }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/clang-release/cargo
          key: cargo-${{ runner.os }}-${{ matrix.flavor }}-${{ hashFiles('Cargo.toml') }}

      - name: Build AppImage (${{ matrix.flavor }})
        run: ./make_appimages.sh ${{ matrix.flavor }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waywallen-appimage-${{ matrix.flavor }}
          path: waywallen-*-${{ matrix.flavor }}-x86_64.AppImage

      # Only release for a tag: tag push, or a manual run whose input starts with "v".
      - name: Determine release
        id: rel
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ] || [[ "$REF" == v* ]]; then
            echo "tag=$REF" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog
        if: steps.rel.outputs.is_release == 'true' && matrix.flavor == 'lite'
        run: |
          python3 scripts/changelog.py "${{ steps.rel.outputs.tag }}" > /tmp/changelog.md
          cat /tmp/changelog.md

      - name: Create release
        if: steps.rel.outputs.is_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.rel.outputs.tag }}
          artifacts: waywallen-*-${{ matrix.flavor }}-x86_64.AppImage
          bodyFile: ${{ matrix.flavor == 'lite' && '/tmp/changelog.md' || '' }}
          immutableCreate: true
          skipIfReleaseExists: true
          allowUpdates: true
