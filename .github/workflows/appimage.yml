name: Build AppImage

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEBIAN_FRONTEND: noninteractive
      WAYWALLEN_CONDA_ENV: waywallen
    steps:
      - name: Install OS prereqs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl ca-certificates git bzip2 file xz-utils \
            build-essential pkg-config glslang-tools \
            libfuse2 libxkbcommon0 libgl1 libegl1 \
            libglib2.0-0

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Miniconda
        run: |
          curl -fsSL -o /tmp/miniconda.sh \
            https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash /tmp/miniconda.sh -b -p "$HOME/miniconda"
          echo "$HOME/miniconda/bin" >> "$GITHUB_PATH"
          echo "$HOME/miniconda/condabin" >> "$GITHUB_PATH"

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: ~/miniconda/envs/waywallen
          key: conda-${{ runner.os }}-${{ hashFiles('environment.yml') }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            build/clang-release/cargo
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'displays/*/Cargo.toml') }}

      - name: Install freetype into conda env
        run: conda install -n waywallen conda-forge::freetype

      - name: Build AppImage
        run: bash ./scripts/build_appimage.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.event.release.tag_name }}
          files: waywallen-*-x86_64.AppImage
