# waywallen-image — the canonical image renderer + source for waywallen.

[plugin]
id = "org.waywallen.image"
name = "Image"
version = "0.1.8"

[source]
lua = "image.lua"

[renderers.waywallen-image]
bin = "bin/waywallen-image-renderer"
types = ["image"]
priority = 100
spawn_version = 5

[renderers.waywallen-image.settings]
fps = { type = "u32", default = 30, min = 1, max = 240, step = 1, identity = true, label_key = "settings.image.fps", group = "render", order = 10 }
# 0 = origin, 1 = 720p, 2 = 1080p, 3 = 1440p, 4 = 2160p; short-edge cap, never upscales.
resolution = { type = "u32", default = 0, min = 0, max = 4, step = 1, identity = true, label_key = "settings.image.resolution", group = "render", order = 15 }
render_node = { type = "string", default = "", identity = true, label_key = "settings.image.render_node", group = "render", order = 20 }
