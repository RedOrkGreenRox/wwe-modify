syntax = "proto3";

package waywallen.control.v1;

import "filter.proto";

// ---------------------------------------------------------------------------
// Envelope
// ---------------------------------------------------------------------------
//
// Wire direction is asymmetric:
//   * client → server : a bare `Request` on every frame.
//   * server → client : a `ServerFrame` wrapping either the matching
//     `Response` (request_id echoes the client's Request) or a
//     server-initiated `Event` (no request_id).
//
// Splitting Event out of `Response` keeps request_id semantics clean
// and lets the server push display state changes without a poll.

message ServerFrame {
  oneof kind {
    Response response = 1;
    Event    event    = 2;
  }
}

message Request {
  reserved 55, 56;

  uint64 request_id = 1;
  oneof payload {
    HealthRequest             health = 10;
    RendererSpawnRequest      renderer_spawn = 11;
    RendererListRequest       renderer_list = 12;
    RendererPlayRequest       renderer_play = 13;
    RendererPauseRequest      renderer_pause = 14;
    RendererMouseRequest      renderer_mouse = 15;
    RendererFpsRequest        renderer_fps = 16;
    RendererKillRequest       renderer_kill = 17;
    RendererPluginListRequest renderer_plugin_list = 18;
    WallpaperListRequest      wallpaper_list = 19;
    WallpaperScanRequest      wallpaper_scan = 20;
    SourceListRequest         source_list = 21;
    WallpaperApplyRequest     wallpaper_apply = 22;
    DisplayListRequest        display_list = 23;
    SettingsGetRequest        settings_get = 24;
    SettingsSetRequest        settings_set = 25;
    LibraryListRequest        library_list = 26;
    LibraryAddRequest         library_add = 27;
    LibraryRemoveRequest      library_remove = 28;
    LibraryAutoDetectRequest  library_auto_detect = 29;
    PlaylistListRequest       playlist_list = 30;
    PlaylistCreateRequest     playlist_create = 31;
    PlaylistDeleteRequest     playlist_delete = 32;
    PlaylistRenameRequest     playlist_rename = 33;
    PlaylistSetItemsRequest   playlist_set_items = 34;
    PlaylistSetModeRequest    playlist_set_mode = 35;
    PlaylistSetIntervalRequest playlist_set_interval = 36;
    PlaylistActivateRequest   playlist_activate = 37;
    PlaylistDeactivateRequest playlist_deactivate = 38;
    PlaylistStatusRequest     playlist_status = 39;
    DisplayLayoutSetRequest   display_layout_set = 40;
    GpuListRequest            gpu_list = 41;
    WallpaperGetRequest       wallpaper_get = 42;
    WallpaperPropertySetRequest wallpaper_property_set = 43;
    WallpaperApplyViaPortalRequest wallpaper_apply_via_portal = 44;
    DisplayRenameRequest      display_rename = 45;
    PluginInstallRequest      plugin_install = 46;
    PluginListRequest         plugin_list = 47;
    TagListRequest            tag_list = 48;
    ContentRatingListRequest  content_rating_list = 49;
    RemoteAvailabilityRequest remote_availability = 50;
    RemoteSearchRequest       remote_search = 51;
    RemoteDownloadRequest     remote_download = 52;
    RemoteUninstallRequest    remote_uninstall = 53;
    RemoteDetailsRequest      remote_details = 54;
    PlaylistJumpToRequest     playlist_jump_to = 58;
    WallpaperLayoutSetRequest wallpaper_layout_set = 59;
  }
}

message Response {
  reserved 55, 56;

  uint64 request_id = 1;
  // Coarse status class, kept for back-compat with clients that haven't
  // adopted `error_code` yet. Derived from `error_code` server-side.
  Status status = 2;
  string message = 3;
  // Typed error pin-pointing the failure. `ERROR_CODE_OK` (0) on success;
  // every non-OK value carries one specific failure category. New clients
  // should branch on this and treat `status`/`message` as legacy fields.
  ErrorCode error_code = 4;
  oneof payload {
    HealthResponse             health = 10;
    RendererSpawnResponse      renderer_spawn = 11;
    RendererListResponse       renderer_list = 12;
    Empty                      renderer_play = 13;
    Empty                      renderer_pause = 14;
    Empty                      renderer_mouse = 15;
    Empty                      renderer_fps = 16;
    Empty                      renderer_kill = 17;
    RendererPluginListResponse renderer_plugin_list = 18;
    WallpaperListResponse      wallpaper_list = 19;
    WallpaperScanResponse      wallpaper_scan = 20;
    SourceListResponse         source_list = 21;
    WallpaperApplyResponse     wallpaper_apply = 22;
    DisplayListResponse        display_list = 23;
    SettingsGetResponse        settings_get = 24;
    Empty                      settings_set = 25;
    LibraryListResponse        library_list = 26;
    Empty                      library_add = 27;
    Empty                      library_remove = 28;
    LibraryAutoDetectResponse  library_auto_detect = 29;
    PlaylistListResponse       playlist_list = 30;
    PlaylistCreateResponse     playlist_create = 31;
    Empty                      playlist_delete = 32;
    Empty                      playlist_rename = 33;
    Empty                      playlist_set_items = 34;
    Empty                      playlist_set_mode = 35;
    Empty                      playlist_set_interval = 36;
    Empty                      playlist_activate = 37;
    Empty                      playlist_deactivate = 38;
    PlaylistStatusResponse     playlist_status = 39;
    DisplayLayoutSetResponse   display_layout_set = 40;
    GpuListResponse            gpu_list = 41;
    WallpaperGetResponse       wallpaper_get = 42;
    WallpaperPropertySetResponse wallpaper_property_set = 43;
    WallpaperApplyViaPortalResponse wallpaper_apply_via_portal = 44;
    DisplayRenameResponse      display_rename = 45;
    PluginInstallResponse      plugin_install = 46;
    PluginListResponse         plugin_list = 47;
    TagListResponse            tag_list = 48;
    ContentRatingListResponse  content_rating_list = 49;
    RemoteAvailabilityResponse remote_availability = 50;
    RemoteSearchResponse       remote_search = 51;
    RemoteDownloadResponse     remote_download = 52;
    RemoteUninstallResponse    remote_uninstall = 53;
    RemoteDetailsResponse      remote_details = 54;
    Empty                      playlist_jump_to = 58;
    WallpaperLayoutSetResponse wallpaper_layout_set = 59;
  }
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  OK = 1;
  INVALID_ARGUMENT = 2;
  NOT_FOUND = 3;
  INTERNAL = 4;
  FAILED_PRECONDITION = 5;
}

// Typed failure code carried on every `Response`. `ERROR_CODE_OK` (0) means
// success; every non-OK value pin-points one specific failure category.
// Numeric ranges are reserved per subsystem so codes can be added without
// collisions: generic 1–99, renderer 100–199, wallpaper/source 200–299,
// settings 300–399, library 400–499, playlist 500–599.
enum ErrorCode {
  ERROR_CODE_OK = 0;

  // Generic / framing
  ERROR_CODE_INTERNAL = 1;
  ERROR_CODE_DECODE = 2;
  ERROR_CODE_INVALID_ARGUMENT = 3;
  ERROR_CODE_UNEXPECTED_PAYLOAD = 4;     // empty `Request.payload`
  ERROR_CODE_FAILED_PRECONDITION = 5;
  ERROR_CODE_DB = 6;

  // Renderers
  ERROR_CODE_RENDERER_NOT_FOUND = 100;
  ERROR_CODE_RENDERER_SPAWN_FAILED = 101;
  ERROR_CODE_RENDERER_CONTROL_FAILED = 102;
  ERROR_CODE_NO_RENDERER_FOR_TYPE = 103;
  ERROR_CODE_RENDERER_TYPE_MISMATCH = 104;
  ERROR_CODE_RENDERER_FRAME_FAILED = 105;

  // Wallpapers / sources
  ERROR_CODE_WALLPAPER_NOT_FOUND = 200;
  ERROR_CODE_NO_DISPLAY_REGISTERED = 201;
  ERROR_CODE_SOURCE_PLUGIN_NOT_FOUND = 202;
  ERROR_CODE_SOURCE_EXTRAS_FAILED = 203;
  ERROR_CODE_WALLPAPER_TYPE_NOT_SUPPORTED = 204;
  ERROR_CODE_PORTAL_CALL_FAILED = 205;
  ERROR_CODE_PLUGIN_INSTALL_FAILED = 206;

  // Settings
  ERROR_CODE_SETTINGS_VALIDATION_FAILED = 300;
  ERROR_CODE_SETTINGS_APPLY_FAILED = 301;

  // Libraries
  ERROR_CODE_LIBRARY_NOT_FOUND = 400;

  // Playlists
  ERROR_CODE_PLAYLIST_NOT_FOUND = 500;
  ERROR_CODE_PLAYLIST_INVALID = 501;
}

message Empty {}

// ---------------------------------------------------------------------------
// Health
// ---------------------------------------------------------------------------

message HealthRequest {}
message HealthResponse {
  string service = 1;
  string state = 2;
}

// ---------------------------------------------------------------------------
// Renderer lifecycle
// ---------------------------------------------------------------------------

message RendererSpawnRequest {
  string wp_type = 1;
  map<string, string> metadata = 2;
  uint32 width = 3;
  uint32 height = 4;
  uint32 fps = 5;
}
message RendererSpawnResponse {
  string renderer_id = 1;
}

message RendererListRequest {}
message RendererListResponse {
  repeated string renderers = 1;
  repeated RendererInstance instances = 2;
}
message RendererInstance {
  string renderer_id = 1;
  uint32 fps         = 2;
  string status      = 3; // "playing" | "paused"
  string name        = 4; // renderer plugin name from RendererDef.name
  uint32 pid         = 5; // OS pid of the renderer child; 0 if unknown
  // DRM render-node id of the GPU this renderer's Vulkan instance picked,
  // sourced from its `Ready` event. Both 0 ⇒ unknown (driver lacks
  // VK_EXT_physical_device_drm). UI cross-references against `GpuList` to
  // show a human description.
  uint32 drm_render_major = 6;
  uint32 drm_render_minor = 7;
  // Most-recent BindBuffers dims; falls back to the spawn-time
  // `Init.extent_w/h` hint pre-bind. 0 ⇒ unknown.
  uint32 texture_width  = 8;
  uint32 texture_height = 9;
}

message RendererPlayRequest  { string renderer_id = 1; }
message RendererPauseRequest { string renderer_id = 1; }

message RendererMouseRequest {
  string renderer_id = 1;
  double x = 2;
  double y = 3;
}

message RendererFpsRequest {
  string renderer_id = 1;
  uint32 fps = 2;
}

message RendererKillRequest { string renderer_id = 1; }

// ---------------------------------------------------------------------------
// Renderer plugin registry
// ---------------------------------------------------------------------------

message RendererPluginListRequest {}
message RendererPluginListResponse {
  repeated RendererPluginInfo renderers = 1;
  repeated string supported_types = 2;
}
message RendererPluginInfo {
  string name = 1;
  string bin = 2;
  repeated string types = 3;
  uint32 priority = 4;
  string version = 5;
  // Per-setting schema entries derived from the manifest's
  // `[renderers.<name>.settings.*]` table. UIs use these to render typed
  // input widgets; daemon enforces validation independently before
  // accepting a `SettingsSet`.
  repeated SettingSchema settings = 6;
  // Domain id of the installable plugin that provides this renderer
  // component (its `plugin.toml` `[plugin].id`).
  string plugin_id = 7;
}

// Wire encoding of one `[renderer.settings.<key>]` row. All
// numerics/defaults are stringified so the message stays uniform with
// `PluginSettings.values` (also string→string). Empty `min`/`max`/`step`
// = unset.
message SettingSchema {
  string key = 1;
  SettingValueType type = 2;
  string default_value = 3;
  bool identity = 4;
  string label_key = 5;
  string description_key = 6;
  string min = 7;
  string max = 8;
  string step = 9;
  repeated string choices = 10;
  string group = 11;
  int32 order = 12;
}

enum SettingValueType {
  SETTING_VALUE_TYPE_UNSPECIFIED = 0;
  SETTING_VALUE_TYPE_U32 = 1;
  SETTING_VALUE_TYPE_F32 = 2;
  SETTING_VALUE_TYPE_STRING = 3;
  SETTING_VALUE_TYPE_BOOL = 4;
  SETTING_VALUE_TYPE_I32 = 5;
}

// ---------------------------------------------------------------------------
// Wallpapers / sources
// ---------------------------------------------------------------------------

message WallpaperEntry {
  string id = 1;
  string name = 2;
  string wp_type = 3;
  string resource = 4;
  string preview = 5;
  map<string, string> metadata = 6;
  int64 size = 7;
  uint32 width = 8;
  uint32 height = 9;
  string content_rating = 10;
  // Tags pulled from the DB at response time. Empty if the entry has
  // no matching DB row or no tags. WallpaperList batch-loads this; the
  // single-item WallpaperGet returns the freshest view.
  repeated string tags = 11;
  // JSON dump of the renderer-published user-property schema
  // (project.json `general.properties` merged with runtime overrides).
  // Empty when no renderer is currently running this wallpaper.
  string user_properties_schema = 12;
  // Per-item edits the user has made to the schema's default values.
  // Persisted in the DB as a JSON object (`{"key":"value", …}`) and
  // shipped to the renderer verbatim through `Init.user_properties`;
  // surfaced here verbatim too so the UI can `JSON.parse` once and
  // avoid relying on Qt's QHash<QString,QString> bridge into QML.
  // Empty string when the user hasn't edited anything.
  string user_property_overrides = 13;
  // Source-provided free-form description (e.g. Wallpaper Engine
  // `project.description`). Empty when the source didn't set one.
  string description = 14;
  // Stable source/plugin identifier (e.g. Wallpaper Engine workshop id).
  // Empty when the source didn't set one.
  string external_id = 15;
  // Per-wallpaper display layout override. When set, this whole layout
  // wins over the display's own layout while the wallpaper is active.
  LayoutPrefs wallpaper_layout_override = 16;
  bool wallpaper_layout_override_set = 17;
}

message WallpaperListRequest {
  string wp_type = 1; // empty = all
  // Page-based pagination. page is 0-indexed; page_size = 0 means "no
  // pagination, return all entries matching wp_type".
  uint32 page = 2;
  uint32 page_size = 3;
  reserved 4;
  repeated WallpaperFilterRule filters = 5;
  repeated FilterLogic filter_logics = 6;
  repeated WallpaperSortRule sorts = 7;
  // Free-text search. Daemon-side this is synthesized into an extra
  // `name CONTAINS <text>` filter rule placed in its own group, which
  // is AND-ed with the existing filter expression.
  string search_text = 8;
  // Wallpaper types to exclude outright (quick type toggles in the UI,
  // independent of the structured filter rules). An entry whose
  // `wp_type` is listed here is dropped before the rule filter runs.
  repeated string skip_types = 9;
  // Quick tag filter (independent of the structured rules): keep only
  // wallpapers having any of these tags. Empty = no constraint (all).
  repeated string filter_tags = 10;
  // Content ratings to exclude (quick toggles, like skip_types). An
  // entry whose `content_rating` is listed here is dropped.
  repeated string skip_content_ratings = 11;
}
message WallpaperListResponse {
  repeated WallpaperEntry wallpapers = 1;
  // Total number of entries matching wp_type, ignoring offset/limit. Allows the
  // client to know when it has fetched the last page.
  uint32 count = 2;
}

// Fetch the freshest view of a single wallpaper (snapshot entry +
// DB media-meta + tags). Used by the UI's detail panel so it can
// show data that may have been written after the initial list page.
message WallpaperGetRequest {
  string wallpaper_id = 1;
}
message WallpaperGetResponse {
  WallpaperEntry entry = 1;
}

// Commit one user-property edit for a wallpaper. The daemon persists
// the (key, value) pair to the item's `user_property_overrides`
// column and, if the wallpaper is currently being rendered, pushes a
// `setting_changed` event to the renderer subprocess so the change
// takes effect immediately. Empty `value` clears the override (revert
// to project.json default).
message WallpaperPropertySetRequest {
  string wallpaper_id = 1;
  string key = 2;
  string value = 3;
}
message WallpaperPropertySetResponse {}

// Commit or clear the per-wallpaper display layout override. Unlike
// `WallpaperPropertySetRequest`, this is daemon-owned data and is
// persisted outside renderer user-property overrides.
message WallpaperLayoutSetRequest {
  string wallpaper_id = 1;
  bool clear = 2;
  LayoutPrefs layout = 3;
}
message WallpaperLayoutSetResponse {
  WallpaperEntry entry = 1;
}

message WallpaperScanRequest {}
// Ack-only — the rescan now runs asynchronously on the daemon. `count`
// is `0` for newly-queued scans; the actual entry count arrives in the
// later `WallpaperSyncFinished` server event so the UI does not have
// to block on the response.
message WallpaperScanResponse {
  uint32 count = 1;
}

message SourceListRequest {}
message SourceListResponse {
  repeated SourcePluginInfo sources = 1;
}
message SourcePluginInfo {
  string name = 1;
  repeated string types = 2;
  string version = 3;
  // Short label a UI shows as the placeholder when prompting for a
  // library path (e.g. "Steam Library Path"). Empty = UI falls back
  // to a generic label.
  string library_label = 4;
  // Longer helper text describing what kind of path to choose. May
  // contain newlines. Empty = no hint shown.
  string library_hint = 5;
}

message WallpaperApplyRequest {
  string wallpaper_id = 1;
  // Target displays. Empty means "apply to all currently registered displays"
  // (the pre-M4 default behaviour). Non-empty: apply only to the listed
  // display_ids (others keep their current wallpaper). Resolution/fps are
  // resolved from settings (global default + plugin overrides), not from
  // this request.
  repeated uint64 display_ids = 5;
  // Optional renderer plugin name. Empty (default) lets the daemon pick
  // the highest-priority renderer registered for the wallpaper's type.
  // Non-empty selects that exact renderer; the daemon validates that it
  // is registered AND advertises this wallpaper's type.
  string renderer_name = 6;
}
message WallpaperApplyResponse {
  string renderer_id = 1;
  string wallpaper_id = 2;
  string wp_type = 3;
  string name = 4;
}

// Apply a wallpaper via the org.freedesktop.portal.Wallpaper portal —
// an independent code path that does not touch the renderer / router /
// display surface. Image-only by design; the DE's portal backend owns
// the actual rendering. Intended as a fallback for environments where
// the daemon has no display (e.g. plain X11 desktops, or before a
// `waywallen-display` consumer has connected). Single-flight under the
// `apply/portal` key.
message WallpaperApplyViaPortalRequest {
  string wallpaper_id = 1;
}
message WallpaperApplyViaPortalResponse {
  string wallpaper_id = 1;
  string uri = 2;
}

// ---------------------------------------------------------------------------
// Displays
// ---------------------------------------------------------------------------

message DisplayLinkInfo {
  string renderer_id = 1;
  int32  z_order     = 2;
}

// Wallpaper fit policy. Values mirror Plasma's wallpaper plugin enum
// (Stretched / PreserveAspectFit / PreserveAspectCrop / Tiled /
// TiledOnlyHorizontally / TiledOnlyVertically / Centered) so the daemon
// API maps 1:1 onto a future Plasma plugin. Tile* variants used to
// exist (tags 4, 5, 6) but were never wired through — the v1
// set_config wire can't express texture wrap in a single rect, and
// the daemon was just degrading them to PRESERVE_ASPECT_FIT.
enum FillMode {
  FILL_MODE_UNSPECIFIED          = 0;
  FILL_MODE_STRETCHED            = 1;
  FILL_MODE_PRESERVE_ASPECT_FIT  = 2;
  FILL_MODE_PRESERVE_ASPECT_CROP = 3;
  FILL_MODE_CENTERED              = 7;
  reserved 4, 5, 6;
  reserved "FILL_MODE_TILED", "FILL_MODE_TILED_ONLY_HORIZONTAL",
           "FILL_MODE_TILED_ONLY_VERTICAL";
}

// Buffer-side rotation applied per display. Mirrors a subset of
// wl_output.transform (0..3 — no flips). The compositor compensates
// for the declared pre-rotation, so visually the wallpaper appears
// rotated CW by the chosen angle.
enum Rotation {
  ROTATION_UNSPECIFIED = 0;
  ROTATION_NORMAL      = 1;
  ROTATION_CW_90       = 2;
  ROTATION_CW_180      = 3;
  ROTATION_CW_270      = 4;
}

// 9-position alignment grid. Kept for older clients; new clients
// should use location_x/location_y below for 0..100 positioning.
enum Align {
  ALIGN_UNSPECIFIED   = 0;
  ALIGN_TOP_LEFT      = 1;
  ALIGN_TOP           = 2;
  ALIGN_TOP_RIGHT     = 3;
  ALIGN_LEFT          = 4;
  ALIGN_CENTER        = 5;
  ALIGN_RIGHT         = 6;
  ALIGN_BOTTOM_LEFT   = 7;
  ALIGN_BOTTOM        = 8;
  ALIGN_BOTTOM_RIGHT  = 9;
}

// Resolved (or default) layout values. Used both for the global
// default in `GlobalSettings.layout_defaults` and for the effective
// layout broadcast back to clients on `DisplayInfo`.
//
// Background / clear color is NOT part of layout. The renderer is
// the sole authority — see `report_state` in waywallen_ipc_v1.
message LayoutPrefs {
  FillMode fillmode = 1;
  Align    align    = 2;
  Rotation rotation = 4;
  uint32   location_x = 5; // 0..100, 50 = center
  uint32   location_y = 6; // 0..100, 50 = center
  bool     location_set = 7;
  reserved 3;
  reserved "clear_rgba";
}

// Sparse per-display override. Each *_set flag, when true, indicates
// that the matching field carries a real value; otherwise the field
// is unset (= "inherit the global default"). Used on
// `DisplayInfo.layout_override` and as the body of
// `DisplayLayoutSetRequest`.
message LayoutOverride {
  bool fillmode_set = 1;
  FillMode fillmode = 2;
  bool align_set    = 3;
  Align align       = 4;
  bool rotation_set = 7;
  Rotation rotation = 8;
  bool   location_set = 9;
  uint32 location_x = 10; // 0..100, 50 = center
  uint32 location_y = 11; // 0..100, 50 = center
  reserved 5, 6;
  reserved "clear_rgba_set", "clear_rgba";
}

enum LayoutSource {
  LAYOUT_SOURCE_UNSPECIFIED = 0;
  LAYOUT_SOURCE_GLOBAL = 1;
  LAYOUT_SOURCE_DISPLAY = 2;
  LAYOUT_SOURCE_WALLPAPER = 3;
}

message DisplayInfo {
  uint64 display_id  = 1;
  string name        = 2;
  uint32 width       = 3;
  uint32 height      = 4;
  uint32 refresh_mhz = 5;
  repeated DisplayLinkInfo links = 6;
  // Resolved fillmode/align/clear_rgba currently in effect for this
  // display (per-display override applied on top of the global
  // defaults). UI binds to this for display.
  LayoutPrefs effective_layout = 7;
  // The raw per-display override (sparse). UI binds to this for the
  // edit form so it can show "inherit" vs. explicit values.
  LayoutOverride layout_override = 8;
  // DRM render-node id of the GPU this display's consumer is on, sourced
  // from `register_display` in the waywallen-display protocol. Both 0 ⇒
  // unknown (the display backend did not query it). UI cross-references
  // against `GpuList` to show a human description.
  uint32 drm_render_major = 9;
  uint32 drm_render_minor = 10;
  string alias = 11;
  // Resolved layout from global + display preferences, before any
  // active wallpaper-local override is applied. UI edit forms bind to
  // this value so display settings remain independently editable.
  LayoutPrefs display_layout = 12;
  LayoutSource effective_layout_source = 13;
}

message DisplayRenameRequest {
  // Live display id to mutate. `name` is retained for older clients but
  // is not used for target resolution.
  string name       = 1;
  string alias      = 2;
  bool   clear      = 3;
  uint64 display_id = 4;
}

message DisplayRenameResponse {
  DisplayInfo display = 1;
}

message RemoteAvailabilityRequest {}

message RemoteSortOption {
  string key = 1;
  string label = 2;
}

message RemoteSourceInfo {
  string id = 1;
  string name = 2;
  bool supports_search = 3;
  repeated RemoteSortOption sorts = 4;
  repeated string tags = 5;
  string content_dir = 6;
}

message RemoteAvailabilityResponse {
  repeated RemoteSourceInfo sources = 1;
  string default_source_id = 2;
}

message RemoteItem {
  string id = 1;
  string title = 2;
  string preview_url = 3;
  string author = 4;
  bool   installed = 5;
  string source_id = 6;
}

message RemoteSearchRequest {
  string source_id = 1;
  string query = 2;
  string sort_key = 3;
  uint32 page = 4;
  repeated string required_tags = 5;
}
message RemoteSearchResponse {
  repeated RemoteItem items = 1;
  bool   has_more = 2;
  string error = 3;
}

message RemoteDownloadRequest {
  string source_id = 1;
  string id = 2;
}
message RemoteDownloadResponse {
  bool   accepted = 1;
  string error = 2;
}

message RemoteUninstallRequest {
  string source_id = 1;
  string id = 2;
}
message RemoteUninstallResponse {
  bool   removed = 1;
  string error = 2;
}

message RemoteDetailsRequest {
  string source_id = 1;
  string id = 2;
}
message RemoteDetailsResponse {
  string description = 1;
  string size = 2;
  repeated string tags = 3;
  string error = 4;
}

enum RemoteDownloadState {
  REMOTE_DOWNLOAD_STATE_UNSPECIFIED = 0;
  REMOTE_DOWNLOAD_STATE_PENDING = 1;
  REMOTE_DOWNLOAD_STATE_DOWNLOADING = 2;
  REMOTE_DOWNLOAD_STATE_DONE = 3;
  REMOTE_DOWNLOAD_STATE_TIMEOUT = 4;
  REMOTE_DOWNLOAD_STATE_ERROR = 5;
}
message RemoteDownloadProgress {
  string source_id = 1;
  string id = 2;
  RemoteDownloadState state = 3;
  string error = 4;
}

message DisplayListRequest {}
message DisplayListResponse {
  repeated DisplayInfo displays = 1;
}

// Mutate the per-display layout override for a single display. The
// daemon writes through to its settings store and re-emits
// `set_config` to the live consumer (if any) immediately. After the
// write the daemon also broadcasts a `DisplayChanged` event so other
// UIs see the new effective layout.
//
// Update semantics: each field is taken from the override message
// only when its matching `*_set` flag is true. To clear (revert to
// global default), set the field's `*_set` flag false in the new
// override AND set the corresponding `clear_*` flag below to true.
// Sending an unspecified override leaves the override entry untouched.
message DisplayLayoutSetRequest {
  // Live display id to mutate. `name` is retained for older clients but
  // is not used for target resolution.
  string name = 1;
  // New override values. Field set/unset behavior follows the
  // `LayoutOverride` message rules.
  LayoutOverride override = 2;
  // Explicit "remove this field from the override" flags. They take
  // precedence over `override.*_set` when both are present (set+clear
  // resolves to clear). Useful for UI that wants to revert a single
  // field to the global default without sending the full override.
  bool clear_fillmode = 3;
  bool clear_align    = 4;
  bool clear_rotation = 6;
  uint64 display_id   = 7;
  bool clear_location = 8;
  reserved 5;
  reserved "clear_clear_rgba";
}

message DisplayLayoutSetResponse {
  // Updated DisplayInfo for the affected display (with refreshed
  // `effective_layout`). Empty if the target live display was absent.
  DisplayInfo display = 1;
}

// ---------------------------------------------------------------------------
// Libraries
// ---------------------------------------------------------------------------

message LibraryInstance {
  int64 id = 1;
  string path = 2;
  string plugin_name = 3;
}

message LibraryListRequest {}
message LibraryListResponse {
  repeated LibraryInstance libraries = 1;
}

message LibraryAddRequest {
  string path = 1;
  string plugin_name = 2;
}

message LibraryRemoveRequest {
  int64 id = 1;
}

// Ask every source plugin to look in well-known locations (Pictures,
// Steam workshop, etc.) and auto-register anything it finds as a new
// library. Returns the paths that were actually added (already-known
// paths are silently skipped).
message LibraryAutoDetectRequest {}
message LibraryAutoDetectResponse {
  repeated LibraryInstance added = 1;
}

// ---------------------------------------------------------------------------
// Server-initiated events (no request_id, carried in `ServerFrame.event`)
// ---------------------------------------------------------------------------

message Event {
  oneof payload {
    DisplaySnapshot        display_snapshot          = 1;
    DisplayChanged         display_changed           = 2;
    DisplayRemoved         display_removed           = 3;
    RendererSnapshot       renderer_snapshot         = 4;
    RendererChanged        renderer_changed          = 5;
    RendererRemoved        renderer_removed          = 6;
    LibrarySnapshot        library_snapshot          = 7;
    LibraryChanged         library_changed           = 8;
    LibraryRemoved         library_removed           = 9;
    WallpaperSyncFinished  wallpaper_sync_finished   = 11;
    LibrariesAdded         libraries_added           = 12;
    StatusSync             status_sync               = 13;
    SettingsChanged        settings_changed          = 14;
    DisplayConnectionFailed display_connection_failed = 15;
    RemoteDownloadProgress remote_download_progress = 16;
    PlaylistChanged        playlist_changed          = 17;
  }
}

// Coarse daemon lifecycle. Orthogonal to `StatusSync.scan_in_progress`.
enum DaemonPhase {
  DAEMON_PHASE_UNSPECIFIED = 0;
  // Booting: WS may already accept connections, but the UI should
  // avoid firing queries (data may be empty / settings may still be
  // reconciling). Show a startup dialog instead.
  DAEMON_PHASE_STARTING = 1;
  // Core services are up (WS bound, DBus published). UI can query.
  // A scan may still be running — that's `scan_in_progress`.
  DAEMON_PHASE_READY = 2;
}

// Snapshot of daemon-side runtime state. Pushed on WS connect and on
// every change that affects any field (phase, scan, task lifecycle).
// Authoritative — transient events are best-effort notifications, but
// `StatusSync` is the field UI binds to for closed-loop state (e.g.
// spinner visibility, startup dialog).
message StatusSync {
  // True while a wallpaper rescan (`refresh_sources`) is in flight.
  bool scan_in_progress = 1;
  // Count of TaskManager tasks currently in `Running` state.
  uint32 active_task_count = 2;
  // Daemon lifecycle phase. UI gates the startup dialog on this.
  DaemonPhase phase = 3;
}

// One or more libraries were just added — by `LibraryAdd` (one path)
// or by `LibraryAutoDetect` (one or more). UI uses this for a toast;
// the matching `LibraryChanged` events still drive list-state updates.
message LibrariesAdded {
  repeated string paths = 1;
}

// External display client failed handshake on the daemon's UDS endpoint
// (bad protocol name or unsupported protocol version). Transient — UI
// surfaces a toast so the user notices a stale waywallen-display binary
// instead of silently getting no wallpapers.
message DisplayConnectionFailed {
  // Echoed from the rejected client's `Hello.client_name`. Empty when
  // the failure happened before a Hello was parsed.
  string client_name              = 1;
  // Echoed from `Hello.client_protocol_version`. 0 when unavailable.
  uint32 client_protocol_version  = 2;
  // Same code as the wire `error` event (see error_code in
  // waywallen_display_v1.xml): 1=PROTO_NAME_MISMATCH, 2=VERSION_UNSUPPORTED.
  uint32 error_code               = 3;
  // One-line human-readable reason — same string sent on the wire.
  string reason                   = 4;
}

// A wallpaper sync finished. `count` is the total entry count after
// the swap; `error` is empty on success, otherwise a one-line reason.
// UI typically reacts with a `Notify` toast and a `WallpaperList`
// refetch — daemon does not push the list itself, only the trigger.
// Sync start is observable via `StatusSync.scan_in_progress`.
message WallpaperSyncFinished {
  uint32 count = 1;
  string error = 2;
}

// Full replacement — sent once right after the WS handshake so a
// freshly-connected UI has a complete picture, and on any mutation that
// touches more than one display (e.g. a batch relink).
message DisplaySnapshot {
  repeated DisplayInfo displays = 1;
}

// A single display was added or its fields changed (links, size, …).
// Receivers should upsert by `display.display_id`.
message DisplayChanged {
  DisplayInfo display = 1;
}

// A display was unregistered. Receivers should drop the entry.
message DisplayRemoved {
  uint64 display_id = 1;
}

// Full replacement for the active-renderer list. Sent once on WS
// handshake and on broadcast-lag recovery.
message RendererSnapshot {
  repeated RendererInstance renderers = 1;
}

// A single renderer was added or its runtime fields changed (status,
// fps). Receivers should upsert by `renderer.renderer_id`.
message RendererChanged {
  RendererInstance renderer = 1;
}

// A renderer was unregistered. Receivers should drop the entry.
message RendererRemoved {
  string renderer_id = 1;
}

// Full replacement for the library list. Sent once on WS handshake.
message LibrarySnapshot {
  repeated LibraryInstance libraries = 1;
}

// A single library was added or its fields changed.
message LibraryChanged {
  LibraryInstance library = 1;
}

// A library was removed.
message LibraryRemoved {
  int64 id = 1;
}

// ---------------------------------------------------------------------------
// Settings
// ---------------------------------------------------------------------------

message GlobalSettings {
  // Tag 1 / 2 used to be `default_width`/`default_height`; replaced by
  // `target_extent` + `render_size_policy` in v7. Both were dropped in
  // the post-extent refactor — render size is now a per-renderer
  // decision driven by the `resolution` plugin setting.
  reserved 1, 2, 4, 5, 9, 10;
  reserved "default_width", "default_height", "target_extent", "render_size_policy";
  // Structured wallpaper-browser filter state. The daemon persists it
  // internally as JSON, but the control plane stays structured so the
  // UI never has to serialize/parse the editor state itself.
  repeated WallpaperFilterRule wallpaper_filters = 6;
  repeated FilterLogic wallpaper_filter_logics = 7;
  // Persisted wallpaper-browser sort. Same shape as `WallpaperListRequest.sorts`
  // (composite, applied in order). Empty ⇒ daemon's default ordering.
  repeated WallpaperSortRule wallpaper_sorts = 8;

  // Note: fps is per-plugin (in PluginSettings) — different renderer
  // engines have different sane defaults, so it's not a global field.
  //
  // Daemon-wide layout defaults applied when a display has no
  // per-display override. UI sends these as the "default for new
  // displays" preset.
  LayoutPrefs layout_defaults = 3;

  // Queue playback mode: "sequential" / "shuffle" / "random". Unknown
  // values are coerced back to "sequential" on the daemon side.
  string queue_mode = 11;

  // Auto-rotation interval in seconds. `0` disables auto-rotation.
  uint32 rotation_secs = 12;

  // Wallpaper types the browser hides via the quick type toggles
  // (above the structured filter rules). Persisted so the selection
  // survives restarts.
  repeated string wallpaper_skip_types = 13;

  // Quick tag filter (independent of the rules): show only wallpapers
  // having any of these tags. Empty = all. Persisted across restarts.
  repeated string wallpaper_filter_tags = 14;

  // Content ratings hidden by the browser's quick toggles. Persisted.
  repeated string wallpaper_skip_content_ratings = 15;

  // Canonical automatic replay policy.
  AutoReplayPolicy auto_replay = 16;

  // Fade duration used for both mute and unmute control messages.
  uint32 audio_fade_ms = 17;
}

enum AutoAction {
  AUTO_ACTION_NONE = 0;
  AUTO_ACTION_MUTE = 1;
  AUTO_ACTION_PAUSE = 2;
  AUTO_ACTION_STOP = 3;
}

message AutoReplayPolicy {
  reserved 1, 2, 3;
  AutoAction any_window = 10;
  AutoAction focused = 11;
  AutoAction maximized = 12;
  AutoAction fullscreen = 13;
  AutoAction session_locked = 14;
  AutoAction session_inactive = 15;
}

// One plugin's settings table. Wire format is string→string for
// uniformity; plugins parse their own values.
message PluginSettings {
  map<string, string> values = 1;
}

message SettingsGetRequest {}
message SettingsGetResponse {
  GlobalSettings global = 1;
  // Keyed by plugin name (RendererDef.name).
  map<string, PluginSettings> plugins = 2;
}

// Full replace. The daemon overwrites global and the plugin map with
// what's sent here. Plugins not present in the request are removed.
message SettingsSetRequest {
  GlobalSettings global = 1;
  map<string, PluginSettings> plugins = 2;
}

// Server-initiated push: the persisted settings just changed. Carries
// the full post-write state so a UI can rebind without a follow-up
// `SettingsGetRequest`. Sent after every successful `SettingsSet` and
// after schema-driven startup reconciliation that filled in defaults
// or dropped unknown keys.
message SettingsChanged {
  GlobalSettings global = 1;
  map<string, PluginSettings> plugins = 2;
}

// ---------------------------------------------------------------------------
// Playlists
// ---------------------------------------------------------------------------
//
// Filter / smart-playlist messages are intentionally absent in this
// revision — the filter model will be reworked, so only curated
// playlists (explicit ordered member list of DB item.id values) are
// reachable from this surface for now. Smart playlists already
// persisted in the DB stay activatable via PlaylistActivate; the
// daemon handles them transparently through the resolve layer.

message PlaylistChanged {
  repeated PlaylistDisplayStatus displays = 1;
  int64 auto_attach_id = 2;
}

enum PlaylistMode {
  PLAYLIST_MODE_UNSPECIFIED = 0;
  SEQUENTIAL = 1;
  SHUFFLE    = 2;
  RANDOM     = 3;
}

// Compact summary for listing. `item_count` is `0` for smart
// playlists in this revision (the resolve layer doesn't materialize
// them outside the active state) — clients should treat it as a hint,
// not a guarantee.
message PlaylistSummary {
  int64  id = 1;
  string name = 2;
  string source_kind = 3;
  PlaylistMode mode = 4;
  uint32 interval_secs = 5;
  uint32 item_count = 6;
  repeated string entry_ids = 7;
}

message PlaylistListRequest {}
message PlaylistListResponse {
  repeated PlaylistSummary playlists = 1;
}

message PlaylistCreateRequest {
  string         name = 1;
  PlaylistMode   mode = 2;
  uint32         interval_secs = 3;
  repeated string entry_ids = 4;
}
message PlaylistCreateResponse {
  int64 id = 1;
}

message PlaylistDeleteRequest { int64 id = 1; }

message PlaylistRenameRequest {
  int64  id = 1;
  string name = 2;
}

message PlaylistSetItemsRequest {
  int64           id = 1;
  repeated string entry_ids = 2;
}

message PlaylistSetModeRequest {
  int64        id = 1;
  PlaylistMode mode = 2;
}

message PlaylistSetIntervalRequest {
  int64  id = 1;
  uint32 interval_secs = 2;
}

message PlaylistActivateRequest {
  int64 id = 1;
  repeated uint64 display_ids = 2;
  bool auto_attach = 3;
}

message PlaylistDeactivateRequest {
  repeated uint64 display_ids = 1;
  int64 clear_auto_attach = 2;
}

message PlaylistDisplayStatus {
  uint64 display_id = 1;
  int64  active_id = 2;
  PlaylistMode mode = 3;
  uint32 interval_secs = 4;
  string current_id = 5;
  uint32 position = 6;
  uint32 count = 7;
  uint32 remaining_secs = 8;
}

message PlaylistStatusRequest {}
message PlaylistStatusResponse {
  repeated PlaylistDisplayStatus displays = 1;
  int64 auto_attach_id = 2;
}

message PlaylistJumpToRequest {
  int64  id = 1;
  string entry_id = 2;
}

// ---------------------------------------------------------------------------
// GPU enumeration
// ---------------------------------------------------------------------------
//
// Snapshot of the host's DRM devices. Daemon walks /dev/dri + sysfs at
// startup (see `gpu::enumerate`) and caches the result; this message
// surfaces it to the UI. Pair with `RendererInstance.drm_render_major/minor`
// and `DisplayInfo.drm_render_major/minor` to label which GPU each
// renderer / display is currently on.
message GpuInfo {
  string render_node    = 1;   // empty if no render node (rare: vgem etc.)
  string primary_node   = 2;   // empty if no primary node
  uint32 render_major   = 3;
  uint32 render_minor   = 4;
  uint32 primary_major  = 5;
  uint32 primary_minor  = 6;
  string pci_bdf        = 7;   // "0000:03:00.0" — empty if not a PCI device
  uint32 vendor_id      = 8;   // PCI vendor (0x1002 / 0x10de / 0x8086 …)
  uint32 device_id      = 9;   // PCI device
  string driver         = 10;  // kernel driver basename: "amdgpu" / "i915" / "nvidia"
  string description    = 11;  // best-effort human label
}

message GpuListRequest {}
message GpuListResponse {
  repeated GpuInfo gpus = 1;
}

// Install an installable plugin from a local .zip into the user plugin dir
// ($XDG_DATA_HOME/waywallen/plugins/). The archive must contain a top-level
// directory holding plugin.toml. Renderer components only take effect after a
// daemon restart (the registry is built at startup), hence `needs_restart`.
message PluginInstallRequest {
  string zip_path = 1;
}
message PluginInstallResponse {
  string plugin_id = 1;
  bool needs_restart = 2;
}

// Installable-plugin (package) view: one entry per `[plugin]`, with the
// renderer components it provides (carrying their settings schema so a UI
// can offer per-plugin configuration). Source presence is a flag.
message PluginInfo {
  string id = 1;
  string name = 2;
  string version = 3;
  bool has_source = 4;
  repeated RendererPluginInfo renderers = 5;
  bool system = 6;
}

message PluginListRequest {}
message PluginListResponse {
  repeated PluginInfo plugins = 1;
}

// All distinct tag names currently in the library DB, for the wallpaper
// browser's tag-filter picker.
message TagListRequest {}
message TagListResponse {
  repeated string tags = 1;
}

// All distinct content-rating values currently in the library DB.
message ContentRatingListRequest {}
message ContentRatingListResponse {
  repeated string ratings = 1;
}
